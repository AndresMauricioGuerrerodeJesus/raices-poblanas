# Nombre de la aplicacion
spring.application.name=raicespoblanas
server.port=8080

# Configuracion de la Base de Datos (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/db_raices_poblanas
spring.datasource.username=postgres
spring.datasource.password=123456789
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuracion de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# CONFIGURACION PARA IMAGENES BASE64
# Aumentamos el limite a 10MB para soportar fotos de artesanos y productos
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Ajustes de Tomcat para procesar textos largos
server.tomcat.max-swallow-size=10MB
server.tomcat.max-http-form-post-size=10MB

# Documentacion Swagger / OpenAPI
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# GraphQL (Para la navegacion OOHDM)
spring.graphql.graphiql.enabled=true